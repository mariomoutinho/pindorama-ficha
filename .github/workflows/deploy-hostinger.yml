name: Deploy Pindorama RPG → Hostinger

# Quando rodar:
#   - push em main      → publica automaticamente;
#   - workflow_dispatch → botão "Run workflow" na aba Actions
#                         (primeiro deploy ou redeploy sem precisar
#                         de novo commit).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita publicações sobrepostas: se um novo push chegar enquanto o
# anterior ainda está subindo, o último é cancelado e o novo prevalece.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload incremental via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          # Não precisamos do histórico completo para fazer upload.
          fetch-depth: 1

      # ----------------------------------------------------------------
      # Conexão FTP simples na porta 21. As contas FTP adicionais da
      # Hostinger NÃO suportam FTPS/TLS — daí `protocol: ftp` (nada de
      # `ftps` nem `ftps-legacy`). A conta usada já está escopada à
      # pasta final do projeto (`public_html/pindorama-rpg/`), então
      # `server-dir: ./` cai direto no lugar certo.
      #
      # O FTP-Deploy-Action faz delta sync incremental: envia apenas o
      # que mudou. NÃO usa `dangerous-clean-slate` (default `false`),
      # logo a pasta jamais é zerada de uma vez. Arquivos remotos que
      # não tenham correspondência local serão alinhados ao
      # repositório — por isso a lista `exclude` protege as áreas de
      # uploads de usuário, estado de runtime e config local.
      # ----------------------------------------------------------------
      - name: Publicar via FTP-Deploy-Action (incremental, sem clean-slate)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server:   ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port:     ${{ secrets.HOSTINGER_FTP_PORT }}
          protocol: ftp
          # Pasta local que será espelhada (raiz do repo).
          local-dir: ./
          # A conta FTP já cai dentro de public_html/pindorama-rpg/,
          # então o destino é a própria raiz remota.
          server-dir: ./
          # Sem clean slate. Mantém arquivos que não conhecemos
          # (uploads dos usuários, estados de runtime) intactos
          # quando combinado com os excludes abaixo.
          dangerous-clean-slate: false
          log-level: standard
          # Excludes (glob style). Tudo aqui:
          #  a) NÃO sobe para o servidor;
          #  b) NÃO é considerado para "alinhamento" — assim as
          #     pastas/arquivos remotos correspondentes ficam
          #     preservados em produção.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.codex/**
            **/.agents/**
            **/.vscode/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            README.md
            DEPLOY-HOSTINGER.md
            DEPLOY_HOSTINGER.md
            PORTE-GODOT.md
            REGRAS-DE-*.md
            # Credenciais e config — criada manualmente no servidor.
            .env
            .env.*
            config.php
            config.local.php
            secrets.*
            # Uploads de usuário (capas, tokens, fotos, NPCs, mapas).
            uploads/**
            # Estados gerados em runtime.
            data/campo-batalha-state*.json
            data/aventuras/*/cenas.json
            # Dumps de banco e backups locais.
            database.sql
            _pindorama_rpg.sql
            *.sql.bak
            *.bak
            *.log
            .DS_Store
            Thumbs.db

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Resumo do deploy"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\` · Commit: \`${GITHUB_SHA::7}\`"
            echo "- Protocolo: \`ftp\` (porta vinda do secret HOSTINGER_FTP_PORT)"
            echo "- Destino: pasta da conta FTP (já apontando para \`public_html/pindorama-rpg/\`)"
            echo "- Modo: incremental (sem clean-slate). Uploads, estado de runtime e config preservados via excludes."
          } >> "$GITHUB_STEP_SUMMARY"
